coverage:
  status:
    # Patch coverage is informational: C FFI bridge functions (crates/hiroz/src/ffi/)
    # are called from Go via CGo and exercised by the Go interop CI job — they cannot
    # be instrumented by cargo-llvm-cov.  Overall project coverage is still enforced.
    patch:
      default:
        informational: true
    project:
      default:
        target: auto
        threshold: 1%

ignore:
  # C FFI bridge — exercised by Go interop tests, not Rust unit tests
  - "crates/hiroz/src/ffi/**"
  # Go source files (not instrumented by cargo-llvm-cov)
  - "crates/hiroz-go/**"
